<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<title></title>
</head>
<body>
	<form>
		<table border="1">
			<tr >
				<td colspan="2" align="center">
					<b>Đăng ký</b>
				</td>
			</tr>
			<tr>
				<td>Full name</td>
				<td>
					<input type="text" placeholder="Nhập fullname">
				</td>
			</tr>
			<tr>
				<td>User name</td>
				<td>
					<input type="text" placeholder="Nhập tên">
				</td>
			</tr>
			<tr>
				<td>Password</td>
				<td>
					<input type="text" placeholder="Nhập mật khẩu">
				</td>
				</td>
			</tr>
			<tr>
				<td>Nhập lại Password</td>
				<td>
					<input type="text" placeholder="Nhập lại mật khẩu">
				</td>
				</td>
			</tr>
			<tr>
				<td>Giới tính</td>
				<td>
					<input type="radio" name="gioi_tinh">Nam
					<input type="radio" name="gioi_tinh">Nữ
				</td>
			</tr>
			<tr>
				<td>Ngày sinh</td>
				<td>
					<select>
						<option>
							Ngày 1
						</option>
						<option>
							Ngày 2
						</option>
						<option>
							Ngày 3
						</option>
						<option>
							Ngày 4
						</option>
					</select>
					<select>
						<option>
							Tháng 1
						</option>
						<option>
							Tháng 2
						</option>
						<option>
							Tháng 3
						</option>
						<option>
							Tháng 4
						</option>
					</select>
					<select>
						<option>
							Năm 2000
						</option>
						<option>
							Năm 2001
						</option>
						<option>
							Năm 2002
						</option>
						<option>
							Năm 2003
						</option>
					</select>
				</td>
			</tr>
			<tr>
				<td>Địa chỉ</td>
				<td>
					<textarea></textarea>
				</td>
			</tr>
			<tr>
				<td>Avatar</td>
				<td>
					<input type="file">
				</td>
			</tr>
			<tr>
				<td>Sở thích</td>
				<td>
					<input type="checkbox">Xem phim
					<input type="checkbox">Thể thao
					<input type="checkbox">Web
				</td>
			</tr>
			<tr colspan="2" align="center">
				<td colspan="2">
					<button type="Submit">Reset</button>
					<button type="Reset">OK</button>
				</td>
			</tr>
		</table>
	</form>
</body>
</html>
